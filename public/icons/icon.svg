<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <g transform="translate(96, 96)" fill="white">
    <!-- Chart bars -->
    <rect x="0" y="180" width="60" height="140" rx="8"/>
    <rect x="90" y="120" width="60" height="200" rx="8"/>
    <rect x="180" y="80" width="60" height="240" rx="8"/>
    <rect x="260" y="140" width="60" height="180" rx="8"/>
    <!-- Trend line -->
    <path d="M30 160 L120 100 L210 60 L290 120" stroke="white" stroke-width="12" stroke-linecap="round" fill="none" opacity="0.8"/>
    <!-- Arrow up -->
    <path d="M270 60 L300 20 L330 60" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  </g>
</svg>
